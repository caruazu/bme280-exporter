name: build-deb

on:
  workflow_dispatch:

jobs:
  build:
    # Native arm64 runner — same architecture as the .deb target (Pi / VM A1).
    runs-on: ubuntu-24.04-arm

    env:
      DEB_BUILD_OPTIONS: nocheck

    steps:
      - uses: actions/checkout@v4

      - name: Install build toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            debhelper \
            fakeroot \
            lintian

      - name: Build .deb (native arm64)
        run: |
          fakeroot debian/rules clean
          fakeroot debian/rules binary

      - name: Inspect package
        run: |
          dpkg-deb --info    bin/bme280-reader_*.deb
          echo "---"
          dpkg-deb --contents bin/bme280-reader_*.deb

      - name: Lint package (informational)
        run: lintian --no-tag-display-experimental bin/bme280-reader_*.deb || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bme280-reader-arm64
          path: bin/bme280-reader_*.deb
          if-no-files-found: error
          retention-days: 30
